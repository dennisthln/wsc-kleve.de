name: Deploy WSC Kleve (Unified)

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "backend/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "bun.lockb"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H kleverweb.de >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='.nuxt' \
            --exclude='.output' \
            --exclude='.next' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.idea' \
            --exclude='backend/payload.db' \
            --exclude='backend/media' \
            ./ \
            root@kleverweb.de:/var/www/vhosts/wsc-kleve.de/

      - name: Deploy Unified Container
        run: |
          ssh root@kleverweb.de << 'EOF'
            cd /var/www/vhosts/wsc-kleve.de/
            docker-compose -p wsckleve up -d --build app
          EOF
